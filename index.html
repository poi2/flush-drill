<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="フラッシュドリル">
<meta name="theme-color" content="#1e88e5">
<title>フラッシュドリル</title>
<style>
  :root {
    --bg: #f5f7fb;
    --panel: #ffffff;
    --primary: #1e88e5;
    --primary-dark: #1565c0;
    --accent: #ff8a00;
    --correct: #2e7d32;
    --wrong: #c62828;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 6px 20px rgba(0,0,0,0.08);
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    overscroll-behavior: none;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    display: flex;
    flex-direction: column;
  }
  h1 {
    font-size: 24px;
    text-align: center;
    margin: 16px 0 8px;
    color: var(--primary-dark);
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    margin-bottom: 24px;
    font-size: 14px;
  }
  .screen { flex: 1; display: flex; flex-direction: column; }
  .hidden { display: none !important; }

  /* --- モード選択 --- */
  .category-heading {
    font-size: 14px;
    font-weight: bold;
    color: var(--muted);
    margin: 8px 4px 4px;
    letter-spacing: 1px;
  }
  .mode-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 4px;
  }
  .mode-btn {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    color: var(--text);
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .mode-btn:active { transform: scale(0.98); }
  .mode-btn .emoji { font-size: 32px; }
  .mode-btn[data-mode="add"] { border-color: #64b5f6; }
  .mode-btn[data-mode="sub"] { border-color: #ffb74d; }
  .mode-btn[data-mode="mul"] { border-color: #81c784; }
  .mode-btn[data-mode="ten-comp"] { border-color: #4db6ac; }
  .mode-btn[data-mode="parity"] { border-color: #a1887f; }
  .mode-btn[data-mode="kanji"] { border-color: #e57373; }
  .mode-btn[data-mode="hira-to-kata"] { border-color: #f48fb1; }
  .mode-btn[data-mode="kata-to-hira"] { border-color: #f06292; }
  .mode-btn[data-mode="antonym"] { border-color: #ff8a65; }
  .mode-btn[data-mode="ja-to-en"] { border-color: #ffd54f; }
  .mode-btn[data-mode="en-to-ja"] { border-color: #ffca28; }
  .mode-btn[data-mode="clock"] { border-color: #ba68c8; }
  .mode-btn[data-mode="season"] { border-color: #f8bbd0; }
  .mode-btn[data-mode="group"] { border-color: #4fc3f7; }

  /* --- とけい クイズ --- */
  .clock-face {
    display: flex;
    justify-content: center;
    margin: 16px 0 8px;
  }
  .clock-face svg { width: 220px; max-width: 100%; height: auto; }

  /* --- かんじ サブメニュー --- */
  .kanji-grade-group + .kanji-grade-group { margin-top: 20px; }
  .kanji-grade-heading {
    font-size: 15px;
    font-weight: bold;
    color: var(--muted);
    margin: 4px 2px 8px;
    letter-spacing: 0.05em;
  }
  .kanji-mode-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .kanji-mode-btn {
    background: var(--panel);
    border: 2px solid #e57373;
    border-radius: 14px;
    padding: 16px 18px;
    font-size: 18px;
    font-weight: bold;
    color: var(--text);
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .kanji-mode-btn:active { transform: scale(0.98); }
  .kanji-mode-btn .hint { font-size: 13px; color: var(--muted); font-weight: normal; }

  /* --- かんじ クイズ --- */
  .kanji-prompt {
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 8px;
  }
  .kanji-prompt.kind-k2r .kanji-char { font-size: 96px; font-weight: bold; line-height: 1; }
  .kanji-prompt.kind-r2k .kanji-reading { font-size: 44px; font-weight: bold; letter-spacing: 2px; }
  .kanji-prompt.kind-sent .kanji-sentence {
    font-size: 26px;
    font-weight: bold;
    line-height: 1.4;
    text-align: center;
  }
  .kanji-prompt.kind-sent .kanji-target-mark {
    color: var(--primary);
    text-decoration: underline;
    text-decoration-thickness: 3px;
    text-underline-offset: 4px;
  }
  .kanji-prompt.kind-sent .kanji-sub-question {
    font-size: 15px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* --- 汎用 4択 クイズ プロンプト --- */
  .choice-prompt {
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 12px 8px;
    font-weight: bold;
    line-height: 1.4;
  }
  .choice-prompt.size-l { font-size: 92px; line-height: 1; }
  .choice-prompt.size-m { font-size: 44px; letter-spacing: 2px; }
  .choice-prompt.size-s { font-size: 26px; }

  .choices {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 8px;
  }
  .choice-btn {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 20px 8px;
    font-size: 26px;
    font-weight: bold;
    color: var(--text);
    box-shadow: var(--shadow);
    cursor: pointer;
    min-height: 72px;
  }
  .choice-btn:active { transform: scale(0.97); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { background: #e8f5e9; border-color: var(--correct); color: var(--correct); }
  .choice-btn.wrong { background: #ffebee; border-color: var(--wrong); color: var(--wrong); }
  .choice-btn.dim { opacity: 0.5; }

  /* --- かけざん サブメニュー --- */
  .submenu-title {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin: 4px 0 12px;
  }
  .row-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .row-btn {
    background: var(--panel);
    border: 2px solid #81c784;
    border-radius: 14px;
    padding: 18px 0;
    font-size: 20px;
    font-weight: bold;
    color: var(--text);
    box-shadow: var(--shadow);
    cursor: pointer;
  }
  .row-btn:active { transform: scale(0.96); }
  .random-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .random-btn {
    background: var(--panel);
    border: 2px solid #ba68c8;
    border-radius: 14px;
    padding: 16px 18px;
    font-size: 18px;
    font-weight: bold;
    color: var(--text);
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .random-btn:active { transform: scale(0.98); }
  .random-btn .hint { font-size: 13px; color: var(--muted); font-weight: normal; }

  .link-row {
    margin-top: 20px;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }
  .link-row a {
    color: var(--primary);
    font-size: 15px;
    text-decoration: none;
    padding: 8px 12px;
  }
  .sound-toggle {
    background: transparent;
    border: none;
    color: var(--primary);
    font-size: 15px;
    cursor: pointer;
    padding: 8px 12px;
  }

  /* --- クイズ画面 --- */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 8px 0 16px;
    font-size: 15px;
    color: var(--muted);
  }
  .back-btn {
    background: transparent;
    border: none;
    color: var(--primary);
    font-size: 15px;
    padding: 4px 8px;
    cursor: pointer;
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width 0.2s;
  }
  .submode-label {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin: 8px 0 10px;
  }

  .question {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 16px;
    text-align: center;
    margin-bottom: 12px;
  }
  .expr {
    font-size: 52px;
    font-weight: bold;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1.2;
  }
  .answer-box {
    margin-top: 16px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: bold;
    color: var(--primary-dark);
  }
  .answer-box.correct { color: var(--correct); }
  .answer-box.wrong { color: var(--wrong); }
  .answer-placeholder { color: #cfd6df; }
  .feedback {
    font-size: 20px;
    margin-top: 4px;
    min-height: 28px;
    font-weight: bold;
  }
  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }

  /* --- テンキー --- */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: auto;
    padding-top: 12px;
  }
  .key {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 28px;
    font-weight: bold;
    padding: 18px 0;
    color: var(--text);
    box-shadow: var(--shadow);
    cursor: pointer;
    min-height: 60px;
  }
  .key:active { transform: scale(0.96); background: #eef3fa; }
  .key.action-clear { background: #fff3e0; color: #e65100; }
  .key.action-submit { background: var(--primary); color: white; }
  .key.action-submit:disabled { background: #b0bec5; }
  .key.next {
    grid-column: 1 / -1;
    background: var(--accent);
    color: white;
  }

  /* --- 結果画面 --- */
  .result-card {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px 20px;
    text-align: center;
    margin-top: 24px;
  }
  .result-score {
    font-size: 64px;
    font-weight: bold;
    color: var(--primary);
    margin: 8px 0;
  }
  .result-score .total { font-size: 32px; color: var(--muted); }
  .result-message { font-size: 20px; margin: 8px 0 4px; }
  .result-mode { color: var(--muted); font-size: 14px; }
  .result-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 24px;
  }
  .btn {
    padding: 16px;
    border-radius: var(--radius);
    font-size: 18px;
    font-weight: bold;
    border: none;
    cursor: pointer;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-secondary { background: var(--panel); color: var(--primary); border: 2px solid var(--primary); }

  /* --- 統計画面 --- */
  .stats-summary {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    text-align: center;
  }
  .stat-item .label { font-size: 12px; color: var(--muted); }
  .stat-item .value { font-size: 22px; font-weight: bold; color: var(--primary-dark); }
  .chart-card {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 16px;
  }
  .chart-title {
    font-size: 15px;
    font-weight: bold;
    margin: 0 0 12px;
    color: var(--text);
  }
  .chart {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 140px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    min-width: 0;
  }
  .bar {
    width: 100%;
    background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    position: relative;
  }
  .bar.zero { background: var(--border); }
  .bar-value {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 2px;
    height: 12px;
  }
  .chart-labels {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .chart-labels .lbl {
    flex: 1;
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .no-data {
    text-align: center;
    color: var(--muted);
    padding: 24px 0;
  }
  .danger-link {
    text-align: center;
    margin-top: 8px;
  }
  .danger-link button {
    background: transparent;
    border: none;
    color: var(--wrong);
    font-size: 13px;
    cursor: pointer;
    padding: 8px;
  }
</style>
</head>
<body>
<div id="app">
  <h1>フラッシュドリル</h1>

  <!-- モード選択 -->
  <section id="screen-menu" class="screen">
    <div class="subtitle">もんだいを えらんでね</div>
    <div class="category-heading">さんすう</div>
    <div class="mode-buttons">
      <button class="mode-btn" data-mode="add">
        <span>たしざん</span><span class="emoji">➕</span>
      </button>
      <button class="mode-btn" data-mode="sub">
        <span>ひきざん</span><span class="emoji">➖</span>
      </button>
      <button class="mode-btn" data-mode="mul">
        <span>かけざん</span><span class="emoji">✖️</span>
      </button>
      <button class="mode-btn" data-mode="ten-comp">
        <span>10 の あわせて</span><span class="emoji">🔟</span>
      </button>
      <button class="mode-btn" data-mode="parity">
        <span>ぐうすう・きすう</span><span class="emoji">⚖️</span>
      </button>
    </div>
    <div class="category-heading">こくご</div>
    <div class="mode-buttons">
      <button class="mode-btn" data-mode="kanji">
        <span>かんじ</span><span class="emoji">漢</span>
      </button>
      <button class="mode-btn" data-mode="hira-to-kata">
        <span>ひらがな ➡ カタカナ</span><span class="emoji">ア</span>
      </button>
      <button class="mode-btn" data-mode="kata-to-hira">
        <span>カタカナ ➡ ひらがな</span><span class="emoji">あ</span>
      </button>
      <button class="mode-btn" data-mode="antonym">
        <span>はんたい ことば</span><span class="emoji">⇔</span>
      </button>
    </div>
    <div class="category-heading">えいご</div>
    <div class="mode-buttons">
      <button class="mode-btn" data-mode="ja-to-en">
        <span>にほんご ➡ えいご</span><span class="emoji">A</span>
      </button>
      <button class="mode-btn" data-mode="en-to-ja">
        <span>えいご ➡ にほんご</span><span class="emoji">🔠</span>
      </button>
    </div>
    <div class="category-heading">りか・せいかつ・しゃかい</div>
    <div class="mode-buttons">
      <button class="mode-btn" data-mode="clock">
        <span>とけい</span><span class="emoji">🕐</span>
      </button>
      <button class="mode-btn" data-mode="season">
        <span>きせつの ことば</span><span class="emoji">🌸</span>
      </button>
      <button class="mode-btn" data-mode="group">
        <span>なかまわけ</span><span class="emoji">🍎</span>
      </button>
    </div>
    <div class="link-row">
      <a href="#" id="link-stats">きろくを みる ›</a>
      <button type="button" class="sound-toggle" id="sound-toggle" aria-label="おと オン/オフ">🔊 おと</button>
    </div>
  </section>

  <!-- かけざん サブメニュー -->
  <section id="screen-mul-menu" class="screen hidden">
    <div class="quiz-header">
      <button class="back-btn" data-goto="menu">‹ もどる</button>
      <span>かけざん</span>
      <span></span>
    </div>
    <div class="submenu-title">どの れんしゅうを する？</div>
    <div class="row-grid">
      <button class="row-btn" data-sub="row-1">1の だん</button>
      <button class="row-btn" data-sub="row-2">2の だん</button>
      <button class="row-btn" data-sub="row-3">3の だん</button>
      <button class="row-btn" data-sub="row-4">4の だん</button>
      <button class="row-btn" data-sub="row-5">5の だん</button>
      <button class="row-btn" data-sub="row-6">6の だん</button>
      <button class="row-btn" data-sub="row-7">7の だん</button>
      <button class="row-btn" data-sub="row-8">8の だん</button>
      <button class="row-btn" data-sub="row-9">9の だん</button>
    </div>
    <div class="random-list">
      <button class="random-btn" data-sub="r1">
        <span>ランダム 1</span><span class="hint">1〜5 の はんい</span>
      </button>
      <button class="random-btn" data-sub="r2">
        <span>ランダム 2</span><span class="hint">だんを 1つ ランダム</span>
      </button>
      <button class="random-btn" data-sub="r3">
        <span>ランダム 3</span><span class="hint">1〜9 の はんい</span>
      </button>
    </div>
  </section>

  <!-- かんじ サブメニュー -->
  <section id="screen-kanji-menu" class="screen hidden">
    <div class="quiz-header">
      <button class="back-btn" data-goto="menu">‹ もどる</button>
      <span>かんじ</span>
      <span></span>
    </div>
    <div class="submenu-title">どの れんしゅうを する？</div>
    <div class="kanji-grade-group" data-grade="10">
      <div class="kanji-grade-heading">10きゅう</div>
      <div class="kanji-mode-list">
        <button class="kanji-mode-btn" data-kanji-mode="k2r" data-grade="10">
          <span>かんじ ➡ よみ</span><span class="hint">かんじを 見て よみを えらぶ</span>
        </button>
        <button class="kanji-mode-btn" data-kanji-mode="r2k" data-grade="10">
          <span>よみ ➡ かんじ</span><span class="hint">よみを 見て かんじを えらぶ</span>
        </button>
        <button class="kanji-mode-btn" data-kanji-mode="ksent" data-grade="10">
          <span>ぶんの なかの よみ</span><span class="hint">ぶんに 出る かんじの よみ</span>
        </button>
      </div>
    </div>
    <div class="submenu-title" id="kanji-loading-hint" style="margin-top:16px;">よみこみちゅう...</div>
  </section>

  <!-- かんじ クイズ画面 -->
  <section id="screen-kanji-quiz" class="screen hidden">
    <div class="quiz-header">
      <button class="back-btn" data-goto="kanjiMenu">‹ もどる</button>
      <span id="kanji-progress-text">1 / 10</span>
      <span id="kanji-score-text">〇 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="kanji-progress-fill"></div></div>
    <div id="kanji-submode-label" class="submode-label"></div>

    <div class="question">
      <div id="kanji-prompt" class="kanji-prompt"></div>
      <div class="feedback" id="kanji-feedback"></div>
    </div>

    <div class="choices" id="kanji-choices"></div>

    <div class="keypad hidden" id="kanji-keypad-next">
      <button class="key next" data-kanji-key="next" id="btn-kanji-next">つぎへ</button>
    </div>
  </section>

  <!-- 汎用 4択 クイズ画面 (カタカナ / はんたい / 10の合成 / つぎのかず / 偶奇 / えいご / なきごえ / きせつ / なかまわけ) -->
  <section id="screen-choice-quiz" class="screen hidden">
    <div class="quiz-header">
      <button class="back-btn" data-goto="menu">‹ もどる</button>
      <span id="choice-progress-text">1 / 10</span>
      <span id="choice-score-text">〇 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="choice-progress-fill"></div></div>
    <div id="choice-submode-label" class="submode-label"></div>

    <div class="question">

<script type="module">
  import { parseJsonl, buildDictionary } from './src/kanji/parse.mjs';
  import {
    generateKanjiToReading,
    generateReadingToKanji,
    generateSentenceReading,
  } from './src/kanji/generator.mjs';
  import { shuffle } from './src/kanji/random.mjs';
  import {
    generateHiraToKata,
    generateKataToHira,
    generateAntonym,
  } from './src/kokugo/generator.mjs';
  import {
    generateTenComp,
    generateParity,
  } from './src/sansu/generator.mjs';
  import { generateJaToEn, generateEnToJa } from './src/eigo/generator.mjs';
  import {
    generateSeason,
    generateGroup,
  } from './src/seikatsu/generator.mjs';

  const MODES = {
    add: { label: 'たしざん', symbol: '＋' },
    sub: { label: 'ひきざん', symbol: '－' },
    mul: { label: 'かけざん', symbol: '×' },
    'ten-comp': { label: '10 の あわせて' },
    parity: { label: 'ぐうすう・きすう' },
    k2r: { label: 'かんじ ➡ よみ' },
    r2k: { label: 'よみ ➡ かんじ' },
    ksent: { label: 'ぶんの なかの よみ' },
    'hira-to-kata': { label: 'ひらがな ➡ カタカナ' },
    'kata-to-hira': { label: 'カタカナ ➡ ひらがな' },
    antonym: { label: 'はんたい ことば' },
    'ja-to-en': { label: 'にほんご ➡ えいご' },
    'en-to-ja': { label: 'えいご ➡ にほんご' },
    clock: { label: 'とけい' },
    season: { label: 'きせつの ことば' },
    group: { label: 'なかまわけ' },
  };

  // 汎用 4択画面を使うモード。生成器を集約。
  const CHOICE_GENERATORS = {
    'hira-to-kata': generateHiraToKata,
    'kata-to-hira': generateKataToHira,
    antonym: generateAntonym,
    'ten-comp': generateTenComp,
    parity: generateParity,
    'ja-to-en': generateJaToEn,
    'en-to-ja': generateEnToJa,
    season: generateSeason,
    group: generateGroup,
  };
  const QUESTIONS_PER_SET = 10;
  const STORAGE_KEY = 'flushdrill_stats_v1';
  const MUTE_KEY = 'flushdrill_muted_v1';

  // Web Audio 合成音。素材ファイル不要、iOS Safari は初回タップで unlock。
  const SoundFx = (() => {
    let ctx = null;
    let muted = localStorage.getItem(MUTE_KEY) === '1';
    function ensureCtx() {
      if (!ctx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) ctx = new AC();
      }
      if (ctx && ctx.state === 'suspended') ctx.resume();
      return ctx;
    }
    function tone(c, freq, startOffset, duration, type, peak) {
      const t0 = c.currentTime + startOffset;
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(peak, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(gain).connect(c.destination);
      osc.start(t0);
      osc.stop(t0 + duration + 0.02);
    }
    return {
      correct() {
        if (muted) return;
        const c = ensureCtx();
        if (!c) return;
        // 明るい上昇 2音 (C5 → G5)。
        tone(c, 523.25, 0, 0.14, 'sine', 0.18);
        tone(c, 783.99, 0.10, 0.20, 'sine', 0.15);
      },
      wrong() {
        if (muted) return;
        const c = ensureCtx();
        if (!c) return;
        // 低音の下降ブザー。三角波でやや柔らかく。
        const t0 = c.currentTime;
        const osc = c.createOscillator();
        const gain = c.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(220, t0);
        osc.frequency.exponentialRampToValueAtTime(110, t0 + 0.35);
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(0.15, t0 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.36);
        osc.connect(gain).connect(c.destination);
        osc.start(t0);
        osc.stop(t0 + 0.38);
      },
      setMuted(m) {
        muted = !!m;
        localStorage.setItem(MUTE_KEY, muted ? '1' : '0');
      },
      isMuted() { return muted; },
    };
  })();

  const state = {
    category: null, // 'arith' | 'kanji'
    mode: null,
    submode: null,
    submodeLabel: '',
    questions: [],
    index: 0,
    correctCount: 0,
    input: '',
    phase: 'input', // 'input' | 'retry' | 'feedback'
    firstAttemptDone: false, // 誤答時のリトライで二重加点しないためのフラグ
  };

  const MUL_SUBMODES = {
    'row-1': '1の だん', 'row-2': '2の だん', 'row-3': '3の だん',
    'row-4': '4の だん', 'row-5': '5の だん', 'row-6': '6の だん',
    'row-7': '7の だん', 'row-8': '8の だん', 'row-9': '9の だん',
    'r1': 'ランダム 1 (1〜5)',
    'r2': 'ランダム 2 (だんしぼり)',
    'r3': 'ランダム 3 (1〜9)',
  };

  // --- 問題生成 ---
  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
  function generateQuestion(mode) {
    let a, b, ans, symbol;
    if (mode === 'add') {
      // 1年生: 繰り上がりを含む 1〜9 + 1〜9（答え 2〜18）
      a = randInt(1, 9);
      b = randInt(1, 9);
      ans = a + b;
      symbol = '＋';
    } else if (mode === 'sub') {
      // 1〜18 から 1〜9 を引く。答えが 0 以上
      a = randInt(2, 18);
      b = randInt(1, Math.min(9, a));
      ans = a - b;
      symbol = '－';
    } else if (mode === 'mul') {
      // 2年生 九九: 1〜9 × 1〜9
      a = randInt(1, 9);
      b = randInt(1, 9);
      ans = a * b;
      symbol = '×';
    }
    return { a, b, ans, symbol };
  }
  function generateSet(mode, submode) {
    if (mode === 'mul' && submode) {
      return generateMulSet(submode);
    }
    const set = [];
    for (let i = 0; i < QUESTIONS_PER_SET; i++) {
      set.push(generateQuestion(mode));
    }
    return set;
  }
  function mulQ(a, b) {
    return { a, b, ans: a * b, symbol: '×' };
  }
  function generateMulSet(submode) {
    const set = [];
    if (submode.startsWith('row-')) {
      const row = parseInt(submode.slice(4), 10);
      for (let i = 0; i < QUESTIONS_PER_SET; i++) {
        set.push(mulQ(row, i + 1));
      }
      return set;
    }
    if (submode === 'r1') {
      for (let i = 0; i < QUESTIONS_PER_SET; i++) {
        set.push(mulQ(randInt(1, 5), randInt(1, 5)));
      }
      return set;
    }
    if (submode === 'r2') {
      const row = randInt(1, 9);
      for (let i = 0; i < QUESTIONS_PER_SET; i++) {
        set.push(mulQ(row, randInt(1, 9)));
      }
      return set;
    }
    // r3
    for (let i = 0; i < QUESTIONS_PER_SET; i++) {
      set.push(mulQ(randInt(1, 9), randInt(1, 9)));
    }
    return set;
  }

  // --- 画面切替 ---
  const screens = {
    menu: document.getElementById('screen-menu'),
    mulMenu: document.getElementById('screen-mul-menu'),
    kanjiMenu: document.getElementById('screen-kanji-menu'),
    quiz: document.getElementById('screen-quiz'),
    kanjiQuiz: document.getElementById('screen-kanji-quiz'),
    clockQuiz: document.getElementById('screen-clock-quiz'),
    choiceQuiz: document.getElementById('screen-choice-quiz'),
    result: document.getElementById('screen-result'),
    stats: document.getElementById('screen-stats'),
  };
  function showScreen(name) {
    Object.entries(screens).forEach(([k, el]) => {
      el.classList.toggle('hidden', k !== name);
    });
    if (name === 'stats') renderStats();
  }

  // --- クイズ ---
  function startQuiz(mode, submode) {
    state.category = 'arith';
    state.mode = mode;
    state.submode = submode || null;
    state.submodeLabel = (mode === 'mul' && submode) ? (MUL_SUBMODES[submode] || '') : '';
    state.questions = generateSet(mode, state.submode);
    state.index = 0;
    state.correctCount = 0;
    state.input = '';
    state.phase = 'input';
    showScreen('quiz');
    renderQuestion();
  }
  function renderQuestion() {
    const q = state.questions[state.index];
    document.getElementById('expr').textContent = `${q.a} ${q.symbol} ${q.b} =`;
    document.getElementById('quiz-progress-text').textContent = `${state.index + 1} / ${QUESTIONS_PER_SET}`;
    document.getElementById('quiz-score-text').textContent = `〇 ${state.correctCount}`;
    document.getElementById('progress-fill').style.width = `${(state.index / QUESTIONS_PER_SET) * 100}%`;
    const subEl = document.getElementById('quiz-submode-label');
    if (state.submodeLabel) {
      // ランダム2は選ばれた段を表示、それ以外はそのままのラベル
      if (state.submode === 'r2' && state.questions.length) {
        subEl.textContent = `ランダム 2 ／ ${state.questions[0].a}の だん`;
      } else {
        subEl.textContent = state.submodeLabel;
      }
      subEl.classList.remove('hidden');
    } else {
      subEl.classList.add('hidden');
    }
    renderInput();
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('answer-box').className = 'answer-box';
    document.getElementById('keypad-input').classList.remove('hidden');
    document.getElementById('keypad-next').classList.add('hidden');
    state.phase = 'input';
    state.firstAttemptDone = false;
  }
  function renderInput() {
    const box = document.getElementById('answer-box');
    if (state.input === '') {
      box.innerHTML = '<span class="answer-placeholder">?</span>';
    } else {
      box.textContent = state.input;
    }
    document.getElementById('btn-submit').disabled = (state.input === '');
  }
  function pressKey(key) {
    if (state.phase === 'feedback') {
      if (key === 'next') nextQuestion();
      return;
    }
    if (state.phase === 'retry') {
      // 誤答フィードバック中。数字/けす を押すと通常入力に戻り、
      // 正解を打ち込ませてから けってい で進める。
      if (/^\d$/.test(key)) {
        state.phase = 'input';
        state.input = key;
        document.getElementById('answer-box').classList.remove('wrong');
        renderInput();
      } else if (key === 'clear') {
        state.phase = 'input';
        state.input = '';
        document.getElementById('answer-box').classList.remove('wrong');
        renderInput();
      }
      // submit は btn-submit が disabled のため無視される
      return;
    }
    if (key === 'clear') {
      state.input = '';
      renderInput();
      return;
    }
    if (key === 'submit') {
      if (state.input === '') return;
      submitAnswer();
      return;
    }
    if (/^\d$/.test(key)) {
      if (state.input.length >= 3) return;
      if (state.input === '' && key === '0') { state.input = '0'; renderInput(); return; }
      if (state.input === '0') { state.input = key; renderInput(); return; }
      state.input += key;
      renderInput();
    }
  }
  function submitAnswer() {
    const q = state.questions[state.index];
    const user = parseInt(state.input, 10);
    const isCorrect = user === q.ans;

    // スコアは初回試行のみ。誤答→リトライで正解しても加点しない。
    if (!state.firstAttemptDone) {
      state.firstAttemptDone = true;
      if (isCorrect) state.correctCount++;
    }

    const box = document.getElementById('answer-box');
    const fb = document.getElementById('feedback');
    if (isCorrect) {
      box.classList.remove('wrong');
      box.classList.add('correct');
      fb.textContent = 'せいかい！';
      fb.className = 'feedback correct';
      SoundFx.correct();
      state.phase = 'feedback';
      document.getElementById('quiz-score-text').textContent = `〇 ${state.correctCount}`;
      document.getElementById('keypad-input').classList.add('hidden');
      document.getElementById('keypad-next').classList.remove('hidden');
    } else {
      // 誤答: keypad-input を保持し、正解を入力させる。けってい は無効化して
      // 誤答連打で先に進めないようにする。
      box.classList.remove('correct');
      box.classList.add('wrong');
      fb.textContent = `ざんねん... こたえは ${q.ans}`;
      fb.className = 'feedback wrong';
      SoundFx.wrong();
      state.phase = 'retry';
      document.getElementById('quiz-score-text').textContent = `〇 ${state.correctCount}`;
      document.getElementById('btn-submit').disabled = true;
    }
  }
  function nextQuestion() {
    state.index++;
    state.input = '';
    if (state.index >= QUESTIONS_PER_SET) {
      finishQuiz();
    } else {
      renderQuestion();
    }
  }
  function finishQuiz() {
    saveResult(state.mode, state.correctCount, QUESTIONS_PER_SET);
    const fillId = state.category === 'kanji' ? 'kanji-progress-fill'
      : state.category === 'clock' ? 'clock-progress-fill'
      : state.category === 'choice' ? 'choice-progress-fill'
      : 'progress-fill';
    document.getElementById(fillId).style.width = '100%';
    document.getElementById('result-correct').textContent = state.correctCount;
    // submode 詳細は かけざん 系のみ。他カテゴリでは state.submodeLabel が
    // モード名そのものなので重複表示を避ける。
    const submode = (state.category === 'arith' && state.submodeLabel) ? ` ／ ${state.submodeLabel}` : '';
    document.getElementById('result-mode').textContent = MODES[state.mode].label + submode;
    const msg = document.getElementById('result-message');
    if (state.correctCount === QUESTIONS_PER_SET) msg.textContent = '🏆 パーフェクト！';
    else if (state.correctCount >= 8) msg.textContent = '👏 すごい！';
    else if (state.correctCount >= 5) msg.textContent = '😊 その ちょうし！';
    else msg.textContent = '💪 もういちど チャレンジ！';
    showScreen('result');
  }

  // --- かんじクイズ ---
  let kanjiDict = null;
  const kanjiDictPromise = (async () => {
    try {
      const res = await fetch('./kanji.jsonl');
      if (!res.ok) throw new Error(`fetch failed: ${res.status}`);
      kanjiDict = buildDictionary(parseJsonl(await res.text()));
    } catch (e) {
      console.error('kanji dict load failed', e);
    } finally {
      const hint = document.getElementById('kanji-loading-hint');
      if (hint) {
        hint.textContent = kanjiDict ? '' : 'かんじデータの よみこみに 失敗しました';
        if (kanjiDict) hint.classList.add('hidden');
      }
    }
  })();

  const KANJI_GENERATORS = {
    k2r: generateKanjiToReading,
    r2k: generateReadingToKanji,
    ksent: generateSentenceReading,
  };

  function generateKanjiSet(mode, dict) {
    const entries = shuffle(dict.entries).slice(0, QUESTIONS_PER_SET);
    return entries.map(e => KANJI_GENERATORS[mode](e, dict));
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  async function startKanjiQuiz(mode) {
    if (!kanjiDict) await kanjiDictPromise;
    if (!kanjiDict) {
      alert('かんじデータの よみこみに 失敗しました');
      return;
    }
    state.category = 'kanji';
    state.mode = mode;
    state.submode = null;
    state.submodeLabel = MODES[mode].label;
    state.questions = generateKanjiSet(mode, kanjiDict);
    state.index = 0;
    state.correctCount = 0;
    state.phase = 'input';
    showScreen('kanjiQuiz');
    renderKanjiQuestion();
  }

  function renderKanjiQuestion() {
    const q = state.questions[state.index];
    const prompt = document.getElementById('kanji-prompt');
    prompt.className = 'kanji-prompt';
    if (q.subtype === 'kanji-to-reading') {
      prompt.classList.add('kind-k2r');
      prompt.innerHTML = `<div class="kanji-char">${escapeHtml(q.question)}</div>`;
    } else if (q.subtype === 'reading-to-kanji') {
      prompt.classList.add('kind-r2k');
      prompt.innerHTML = `<div class="kanji-reading">${escapeHtml(q.question)}</div>`;
    } else {
      prompt.classList.add('kind-sent');
      const target = escapeHtml(q.target);
      const marked = escapeHtml(q.sentence).split(target).join(
        `<span class="kanji-target-mark">${target}</span>`,
      );
      prompt.innerHTML =
        `<div class="kanji-sentence">${marked}</div>` +
        `<div class="kanji-sub-question">「${target}」の よみは？</div>`;
    }

    document.getElementById('kanji-progress-text').textContent = `${state.index + 1} / ${QUESTIONS_PER_SET}`;
    document.getElementById('kanji-score-text').textContent = `〇 ${state.correctCount}`;
    document.getElementById('kanji-progress-fill').style.width = `${(state.index / QUESTIONS_PER_SET) * 100}%`;
    document.getElementById('kanji-submode-label').textContent = state.submodeLabel;

    const fb = document.getElementById('kanji-feedback');
    fb.textContent = '';
    fb.className = 'feedback';

    const choicesEl = document.getElementById('kanji-choices');
    choicesEl.innerHTML = '';
    q.choices.forEach((choice, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.dataset.choiceIndex = String(i);
      btn.textContent = choice;
      choicesEl.appendChild(btn);
    });

    document.getElementById('kanji-keypad-next').classList.add('hidden');
    state.phase = 'input';
    state.firstAttemptDone = false;
  }

  function handleKanjiChoice(index) {
    if (state.phase === 'feedback') return;
    const q = state.questions[state.index];
    const isCorrect = index === q.answerIndex;

    // スコアは初回のみ。リトライで正解しても加点しない。
    if (!state.firstAttemptDone) {
      state.firstAttemptDone = true;
      if (isCorrect) state.correctCount++;
    }

    const buttons = document.querySelectorAll('#kanji-choices .choice-btn');
    const fb = document.getElementById('kanji-feedback');

    if (isCorrect) {
      state.phase = 'feedback';
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answerIndex) btn.classList.add('correct');
        else if (!btn.classList.contains('wrong')) btn.classList.add('dim');
      });
      fb.textContent = 'せいかい！';
      fb.className = 'feedback correct';
      SoundFx.correct();
      document.getElementById('kanji-score-text').textContent = `〇 ${state.correctCount}`;
      document.getElementById('kanji-keypad-next').classList.remove('hidden');
    } else {
      // 誤答: 押した選択肢を wrong で無効化、他は dim で無効化し、正解だけ
      // タップ可能な状態にする。子どもは「たけ」の位置を能動的に確認して進む。
      state.phase = 'retry';
      buttons.forEach((btn, i) => {
        if (i === q.answerIndex) {
          btn.classList.add('correct');
          btn.disabled = false;
        } else if (i === index) {
          btn.classList.add('wrong');
          btn.disabled = true;
        } else {
          btn.classList.add('dim');
          btn.disabled = true;
        }
      });
      fb.textContent = `こたえは「${q.choices[q.answerIndex]}」`;
      fb.className = 'feedback wrong';
      SoundFx.wrong();
      document.getElementById('kanji-score-text').textContent = `〇 ${state.correctCount}`;
    }
  }

  function nextKanjiQuestion() {
    state.index++;
    if (state.index >= QUESTIONS_PER_SET) {
      finishQuiz();
    } else {
      renderKanjiQuestion();
    }
  }

  // --- 汎用 4択クイズ (カタカナ, はんたい, 10の合成, 数の並び, 偶奇, 英語, なきごえ, きせつ, なかまわけ) ---

  /** プロンプト文字列の長さから表示サイズを決める。 */
  function choicePromptSize(text) {
    if (text.length <= 2) return 'size-l';
    if (text.length <= 6) return 'size-m';
    return 'size-s';
  }

  function generateChoiceSet(mode) {
    const gen = CHOICE_GENERATORS[mode];
    if (!gen) throw new Error(`unknown choice mode: ${mode}`);
    // 同じ問題が連続すると単調なので、生成した問題の question キーで重複を軽く避ける。
    // 完全なユニーク保証は難しいので best-effort（母集団が少ないモードでは重複してもよい）。
    const set = [];
    const seen = new Set();
    let attempts = 0;
    while (set.length < QUESTIONS_PER_SET && attempts < QUESTIONS_PER_SET * 6) {
      attempts++;
      const q = gen();
      const key = q.question;
      if (seen.has(key)) continue;
      seen.add(key);
      set.push(q);
    }
    while (set.length < QUESTIONS_PER_SET) set.push(gen());
    return set;
  }

  function startChoiceQuiz(mode) {
    state.category = 'choice';
    state.mode = mode;
    state.submode = null;
    state.submodeLabel = MODES[mode].label;
    state.questions = generateChoiceSet(mode);
    state.index = 0;
    state.correctCount = 0;
    state.phase = 'input';
    showScreen('choiceQuiz');
    renderChoiceQuestion();
  }

  function renderChoiceQuestion() {
    const q = state.questions[state.index];
    const prompt = document.getElementById('choice-prompt');
    prompt.className = 'choice-prompt ' + choicePromptSize(q.question);
    prompt.textContent = q.question;

    document.getElementById('choice-progress-text').textContent = `${state.index + 1} / ${QUESTIONS_PER_SET}`;
    document.getElementById('choice-score-text').textContent = `〇 ${state.correctCount}`;
    document.getElementById('choice-progress-fill').style.width = `${(state.index / QUESTIONS_PER_SET) * 100}%`;
    document.getElementById('choice-submode-label').textContent = state.submodeLabel;

    const fb = document.getElementById('choice-feedback');
    fb.textContent = '';
    fb.className = 'feedback';

    const choicesEl = document.getElementById('choice-choices');
    choicesEl.innerHTML = '';
    q.choices.forEach((choice, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.dataset.choiceIndex = String(i);
      btn.textContent = choice;
      choicesEl.appendChild(btn);
    });

    document.getElementById('choice-keypad-next').classList.add('hidden');
    state.phase = 'input';
    state.firstAttemptDone = false;
  }

  function handleChoiceSelect(index) {
    if (state.phase === 'feedback') return;
    const q = state.questions[state.index];
    const isCorrect = index === q.answerIndex;

    if (!state.firstAttemptDone) {
      state.firstAttemptDone = true;
      if (isCorrect) state.correctCount++;
    }

    const buttons = document.querySelectorAll('#choice-choices .choice-btn');
    const fb = document.getElementById('choice-feedback');

    if (isCorrect) {
      state.phase = 'feedback';
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answerIndex) btn.classList.add('correct');
        else if (!btn.classList.contains('wrong')) btn.classList.add('dim');
      });
      fb.textContent = 'せいかい！';
      fb.className = 'feedback correct';
      SoundFx.correct();
      document.getElementById('choice-score-text').textContent = `〇 ${state.correctCount}`;
      document.getElementById('choice-keypad-next').classList.remove('hidden');
    } else {
      // 誤答: 誤りは wrong で無効化、他は dim、正解のみ押せる状態にして
      // 学習者に正しい選択肢を能動的に確認させる（kanji/clock と同じ挙動）。
      state.phase = 'retry';
      buttons.forEach((btn, i) => {
        if (i === q.answerIndex) {
          btn.classList.add('correct');
          btn.disabled = false;
        } else if (i === index) {
          btn.classList.add('wrong');
          btn.disabled = true;
        } else {
          btn.classList.add('dim');
          btn.disabled = true;
        }
      });
      fb.textContent = `こたえは「${q.choices[q.answerIndex]}」`;
      fb.className = 'feedback wrong';
      SoundFx.wrong();
      document.getElementById('choice-score-text').textContent = `〇 ${state.correctCount}`;
    }
  }

  function nextChoiceQuestion() {
    state.index++;
    if (state.index >= QUESTIONS_PER_SET) {
      finishQuiz();
    } else {
      renderChoiceQuestion();
    }
  }

  // --- とけいクイズ ---
  const CLOCK_MINUTES = [0, 15, 30, 45];
  function formatClockTime(h, m) {
    return m === 0 ? `${h}時` : `${h}時${m}分`;
  }
  function generateClockQuestion() {
    const h = randInt(1, 12);
    const m = CLOCK_MINUTES[randInt(0, 3)];
    const pool = [];
    for (let hh = 1; hh <= 12; hh++) {
      for (const mm of CLOCK_MINUTES) {
        if (hh === h && mm === m) continue;
        pool.push({ h: hh, m: mm });
      }
    }
    const distractors = shuffle(pool).slice(0, 3);
    const options = shuffle([{ h, m }, ...distractors]);
    const answerIndex = options.findIndex(o => o.h === h && o.m === m);
    return { h, m, options, answerIndex };
  }
  function generateClockSet() {
    const set = [];
    for (let i = 0; i < QUESTIONS_PER_SET; i++) set.push(generateClockQuestion());
    return set;
  }
  function renderClockFace(h, m) {
    const minuteAngle = m * 6;
    // 時針は分に応じて進む (1分あたり 0.5度)
    const hourAngle = ((h % 12) * 30) + (m * 0.5);
    const numbers = [];
    for (let i = 1; i <= 12; i++) {
      const a = (i * 30 - 90) * Math.PI / 180;
      const x = 100 + Math.cos(a) * 74;
      const y = 100 + Math.sin(a) * 74;
      numbers.push(
        `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#333">${i}</text>`
      );
    }
    const ticks = [];
    for (let i = 0; i < 60; i++) {
      const a = (i * 6 - 90) * Math.PI / 180;
      const r1 = i % 5 === 0 ? 82 : 86;
      const r2 = 90;
      const x1 = 100 + Math.cos(a) * r1;
      const y1 = 100 + Math.sin(a) * r1;
      const x2 = 100 + Math.cos(a) * r2;
      const y2 = 100 + Math.sin(a) * r2;
      const w = i % 5 === 0 ? 2 : 1;
      ticks.push(`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#333" stroke-width="${w}"/>`);
    }
    return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="とけい">
      <circle cx="100" cy="100" r="95" fill="#fff" stroke="#333" stroke-width="3"/>
      ${ticks.join('')}
      ${numbers.join('')}
      <line x1="100" y1="100" x2="100" y2="50" stroke="#1976d2" stroke-width="7" stroke-linecap="round" transform="rotate(${hourAngle.toFixed(2)} 100 100)"/>
      <line x1="100" y1="100" x2="100" y2="22" stroke="#d32f2f" stroke-width="4" stroke-linecap="round" transform="rotate(${minuteAngle.toFixed(2)} 100 100)"/>
      <circle cx="100" cy="100" r="5" fill="#333"/>
    </svg>`;
  }
  function startClockQuiz() {
    state.category = 'clock';
    state.mode = 'clock';
    state.submode = null;
    state.submodeLabel = '';
    state.questions = generateClockSet();
    state.index = 0;
    state.correctCount = 0;
    state.phase = 'input';
    showScreen('clockQuiz');
    renderClockQuestion();
  }
  function renderClockQuestion() {
    const q = state.questions[state.index];
    document.getElementById('clock-face').innerHTML = renderClockFace(q.h, q.m);
    document.getElementById('clock-progress-text').textContent = `${state.index + 1} / ${QUESTIONS_PER_SET}`;
    document.getElementById('clock-score-text').textContent = `〇 ${state.correctCount}`;
    document.getElementById('clock-progress-fill').style.width = `${(state.index / QUESTIONS_PER_SET) * 100}%`;

    const fb = document.getElementById('clock-feedback');
    fb.textContent = '';
    fb.className = 'feedback';

    const choicesEl = document.getElementById('clock-choices');
    choicesEl.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.dataset.choiceIndex = String(i);
      btn.textContent = formatClockTime(opt.h, opt.m);
      choicesEl.appendChild(btn);
    });

    document.getElementById('clock-keypad-next').classList.add('hidden');
    state.phase = 'input';
    state.firstAttemptDone = false;
  }
  function handleClockChoice(index) {
    if (state.phase === 'feedback') return;
    const q = state.questions[state.index];
    const isCorrect = index === q.answerIndex;

    if (!state.firstAttemptDone) {
      state.firstAttemptDone = true;
      if (isCorrect) state.correctCount++;
    }

    const buttons = document.querySelectorAll('#clock-choices .choice-btn');
    const fb = document.getElementById('clock-feedback');

    if (isCorrect) {
      state.phase = 'feedback';
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answerIndex) btn.classList.add('correct');
        else if (!btn.classList.contains('wrong')) btn.classList.add('dim');
      });
      fb.textContent = 'せいかい！';
      fb.className = 'feedback correct';
      SoundFx.correct();
      document.getElementById('clock-score-text').textContent = `〇 ${state.correctCount}`;
      document.getElementById('clock-keypad-next').classList.remove('hidden');
    } else {
      state.phase = 'retry';
      buttons.forEach((btn, i) => {
        if (i === q.answerIndex) {
          btn.classList.add('correct');
          btn.disabled = false;
        } else if (i === index) {
          btn.classList.add('wrong');
          btn.disabled = true;
        } else {
          btn.classList.add('dim');
          btn.disabled = true;
        }
      });
      fb.textContent = `こたえは「${formatClockTime(q.options[q.answerIndex].h, q.options[q.answerIndex].m)}」`;
      fb.className = 'feedback wrong';
      SoundFx.wrong();
      document.getElementById('clock-score-text').textContent = `〇 ${state.correctCount}`;
    }
  }
  function nextClockQuestion() {
    state.index++;
    if (state.index >= QUESTIONS_PER_SET) {
      finishQuiz();
    } else {
      renderClockQuestion();
    }
  }

  // --- 記録 ---
  function todayKey() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  function loadStats() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return {};
      return JSON.parse(raw);
    } catch (e) {
      return {};
    }
  }
  function saveStats(stats) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
    } catch (e) { /* quota等は無視 */ }
  }
  function saveResult(mode, correct, total) {
    const stats = loadStats();
    const key = todayKey();
    if (!stats[key]) stats[key] = {};
    if (!stats[key][mode]) stats[key][mode] = { c: 0, t: 0 };
    stats[key][mode].c += correct;
    stats[key][mode].t += total;
    saveStats(stats);
  }

  // --- 統計画面レンダリング ---
  function renderStats() {
    const stats = loadStats();
    const today = todayKey();

    // 直近14日の日付リスト
    const days = [];
    const now = new Date();
    for (let i = 13; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(now.getDate() - i);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      days.push({ key: `${y}-${m}-${day}`, month: d.getMonth() + 1, day: d.getDate() });
    }

    const sumDay = (v) => Object.values(v || {}).reduce((s, m) => s + (m?.c || 0), 0);
    let todayCorrect = 0, weekCorrect = 0, totalCorrect = 0;
    Object.entries(stats).forEach(([k, v]) => {
      const c = sumDay(v);
      totalCorrect += c;
      if (k === today) todayCorrect = c;
    });
    days.slice(-7).forEach(d => {
      weekCorrect += sumDay(stats[d.key]);
    });

    document.getElementById('stat-today').textContent = todayCorrect;
    document.getElementById('stat-week').textContent = weekCorrect;
    document.getElementById('stat-total').textContent = totalCorrect;

    // 14日棒グラフ
    const daily = days.map(d => ({ ...d, count: sumDay(stats[d.key]) }));
    renderBarChart('chart-total', daily, d => d.count, d => `${d.month}/${d.day}`);

    // モード別（きょう）。モード数が増えたので count>0 のもののみ表示する。
    // データが 1 件もなければ renderBarChart 側の空表示にフォールバックする。
    const todayData = stats[today] || {};
    const modeData = [
      { key: 'add', label: 'たし', count: todayData.add?.c || 0 },
      { key: 'sub', label: 'ひき', count: todayData.sub?.c || 0 },
      { key: 'mul', label: 'かけ', count: todayData.mul?.c || 0 },
      { key: 'ten-comp', label: '10あ', count: todayData['ten-comp']?.c || 0 },
      { key: 'parity', label: '偶奇', count: todayData.parity?.c || 0 },
      { key: 'k2r', label: '漢→読', count: todayData.k2r?.c || 0 },
      { key: 'r2k', label: '読→漢', count: todayData.r2k?.c || 0 },
      { key: 'ksent', label: '文中', count: todayData.ksent?.c || 0 },
      { key: 'hira-to-kata', label: 'あ→ア', count: todayData['hira-to-kata']?.c || 0 },
      { key: 'kata-to-hira', label: 'ア→あ', count: todayData['kata-to-hira']?.c || 0 },
      { key: 'antonym', label: '反対', count: todayData.antonym?.c || 0 },
      { key: 'ja-to-en', label: '日→英', count: todayData['ja-to-en']?.c || 0 },
      { key: 'en-to-ja', label: '英→日', count: todayData['en-to-ja']?.c || 0 },
      { key: 'clock', label: 'とけい', count: todayData.clock?.c || 0 },
      { key: 'season', label: '季節', count: todayData.season?.c || 0 },
      { key: 'group', label: '仲間', count: todayData.group?.c || 0 },
    ].filter(d => d.count > 0);
    renderBarChart('chart-mode-today', modeData, d => d.count, d => d.label);
  }
  function renderBarChart(containerId, data, getValue, getLabel) {
    const container = document.getElementById(containerId);
    const max = Math.max(1, ...data.map(getValue));
    if (data.every(d => getValue(d) === 0)) {
      container.innerHTML = '<div class="no-data">まだ きろくが ないよ</div>';
      return;
    }
    const bars = data.map(d => {
      const v = getValue(d);
      const h = (v / max) * 100;
      return `<div class="bar-col">
        <div class="bar-value">${v > 0 ? v : ''}</div>
        <div class="bar ${v === 0 ? 'zero' : ''}" style="height: ${Math.max(v > 0 ? h : 0, v > 0 ? 4 : 0)}%"></div>
      </div>`;
    }).join('');
    const labels = data.map(d => `<div class="lbl">${getLabel(d)}</div>`).join('');
    container.innerHTML = `<div class="chart">${bars}</div><div class="chart-labels">${labels}</div>`;
  }

  // --- イベント配線 ---
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      if (mode === 'mul') showScreen('mulMenu');
      else if (mode === 'kanji') showScreen('kanjiMenu');
      else if (mode === 'clock') startClockQuiz();
      else if (CHOICE_GENERATORS[mode]) startChoiceQuiz(mode);
      else startQuiz(mode);
    });
  });
  document.querySelectorAll('[data-sub]').forEach(btn => {
    btn.addEventListener('click', () => startQuiz('mul', btn.dataset.sub));
  });
  document.querySelectorAll('[data-kanji-mode]').forEach(btn => {
    btn.addEventListener('click', () => startKanjiQuiz(btn.dataset.kanjiMode));
  });
  document.getElementById('kanji-choices').addEventListener('click', (e) => {
    const btn = e.target.closest('.choice-btn');
    if (!btn) return;
    handleKanjiChoice(parseInt(btn.dataset.choiceIndex, 10));
  });
  document.querySelectorAll('[data-kanji-key]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.kanjiKey === 'next') nextKanjiQuestion();
    });
  });
  document.getElementById('clock-choices').addEventListener('click', (e) => {
    const btn = e.target.closest('.choice-btn');
    if (!btn) return;
    handleClockChoice(parseInt(btn.dataset.choiceIndex, 10));
  });
  document.querySelectorAll('[data-clock-key]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.clockKey === 'next') nextClockQuestion();
    });
  });
  document.getElementById('choice-choices').addEventListener('click', (e) => {
    const btn = e.target.closest('.choice-btn');
    if (!btn) return;
    handleChoiceSelect(parseInt(btn.dataset.choiceIndex, 10));
  });
  document.querySelectorAll('[data-choice-key]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.choiceKey === 'next') nextChoiceQuestion();
    });
  });
  document.getElementById('link-stats').addEventListener('click', (e) => {
    e.preventDefault();
    showScreen('stats');
  });
  const soundToggle = document.getElementById('sound-toggle');
  function renderSoundToggle() {
    soundToggle.textContent = SoundFx.isMuted() ? '🔇 おと' : '🔊 おと';
  }
  renderSoundToggle();
  soundToggle.addEventListener('click', () => {
    SoundFx.setMuted(!SoundFx.isMuted());
    renderSoundToggle();
  });
  document.querySelectorAll('[data-goto]').forEach(el => {
    el.addEventListener('click', () => {
      const dest = el.dataset.goto;
      if (dest === 'restart') {
        if (state.category === 'kanji') startKanjiQuiz(state.mode);
        else if (state.category === 'clock') startClockQuiz();
        else if (state.category === 'choice') startChoiceQuiz(state.mode);
        else startQuiz(state.mode, state.submode);
      } else {
        showScreen(dest);
      }
    });
  });
  document.querySelectorAll('.key').forEach(k => {
    k.addEventListener('click', () => pressKey(k.dataset.key));
  });
  document.getElementById('btn-clear-data').addEventListener('click', () => {
    if (confirm('きろくを ぜんぶ けしますか？')) {
      localStorage.removeItem(STORAGE_KEY);
      renderStats();
    }
  });

  showScreen('menu');
</script>
